<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Student Results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #38bdf8);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    main {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 420px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: slideUp 0.9s ease;
      text-align: center;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h3 {
      color: #ffffff;
      margin-bottom: 25px;
      font-size: 24px;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.9);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.3);
    }

    @media (max-width: 480px) {
      .card {
        width: 90%;
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <main>
    <div class="card">
      <h3>Search Student Results</h3>

      <input type="text" id="regno" placeholder="Enter Registration Number">
      <button onclick="searchResults()">Search</button>

      <div id="results" style="margin-top:20px; color:#fff;"></div>
    </div>
  </main>

<script>
  async function searchResults() {
    const regno = document.getElementById("regno").value.trim();
    const container = document.getElementById("results");

    if (!regno) {
      alert("Please enter a registration number");
      return;
    }

    container.innerHTML = "Searching...";

    try {
      const res = await fetch(`/api/results/${encodeURIComponent(regno)}`);
      const data = await res.json();

      if (!res.ok) {
        container.innerHTML = data.error || "No results found";
        return;
      }

      const results = data.results || data;
      if (!results || results.length === 0) {
        container.innerHTML = "No results found.";
        return;
      }

      let html = "<table style='width:100%;border-collapse:collapse;background:#fff;color:#0f172a;border-radius:8px;overflow:hidden;'>";
      html += "<tr style='background:#e0e7ff;color:#1e3a8a;'><th style='padding:8px;'>Subject</th><th style='padding:8px;'>Marks</th><th style='padding:8px;'>Grade</th></tr>";
      results.forEach(r => {
        html += `<tr><td style='padding:8px;text-align:center;'>${r.subject}</td><td style='padding:8px;text-align:center;'>${r.marks}</td><td style='padding:8px;text-align:center;'>${r.grade}</td></tr>`;
      });
      html += "</table>";

      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = "Failed to search results.";
    }
  }
</script>

</body>
</html>
