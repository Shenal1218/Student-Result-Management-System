<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Result System - GPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #38bdf8);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #0f172a;
    }

    .container {
      width: 800px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      color: #fff;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    label {
      color: #e5e7eb;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 5px;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #e0e7ff;
      color: #1e3a8a;
    }

    .gpa-box {
      margin-top: 20px;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #1e3a8a;
    }

    @media(max-width:768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .container {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Student GPA Calculator</h2>

  <div class="grid">
    <div>
      <label for="regno">Registration Number</label>
      <input type="text" id="regno" placeholder="Enter registration number">
      <button onclick="loadGpa()">Load GPA</button>
      <p id="status" style="margin-top:12px;color:#e5e7eb;font-size:14px;"></p>
    </div>

    <div>
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Point</th>
          </tr>
        </thead>
        <tbody id="resultTable"></tbody>
      </table>

      <div class="gpa-box">
        GPA: <span id="gpa">0.00</span>
      </div>
    </div>
  </div>
</div>

<script>
  async function loadGpa() {
    const regnoInput = document.getElementById("regno");
    const statusEl = document.getElementById("status");
    const tableBody = document.getElementById("resultTable");
    const gpaEl = document.getElementById("gpa");

    const regno = regnoInput.value.trim();
    if (!regno) {
      alert("Please enter a registration number");
      return;
    }

    statusEl.textContent = "Loading GPA...";
    tableBody.innerHTML = "";
    gpaEl.innerText = "0.00";

    try {
      const res = await fetch(`/api/gpa/${encodeURIComponent(regno)}`);
      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = data.error || "No results found for this registration number.";
        return;
      }

      const gradePoints = data.gradePoints || [];

      if (!gradePoints.length) {
        statusEl.textContent = "No subjects found for this student.";
        return;
      }

      gradePoints.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${r.subject}</td>
          <td>${r.marks}</td>
          <td>${r.grade}</td>
          <td>${r.point}</td>
        `;
        tableBody.appendChild(row);
      });

      const gpaValue = Number(data.gpa);
      gpaEl.innerText = isNaN(gpaValue) ? "0.00" : gpaValue.toFixed(2);
      statusEl.textContent = `GPA loaded for ${data.regno}`;
    } catch (err) {
      console.error("Failed to load GPA", err);
      statusEl.textContent = "Failed to load GPA. Please try again.";
    }
  }
</script>

</body>
</html>
